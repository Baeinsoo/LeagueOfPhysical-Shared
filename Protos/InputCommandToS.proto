syntax = "proto3";

import "InputCommand.proto";
import "ProtoTransform.proto";

// 패킷당 redundancy로 묶어 보낼 단일 입력 엔트리(필드 타입 — wire 직접 전송 안 함, 자동 생성 마커 없음 → MessageId 없음).
message InputCommandEntry
{
	int64 tick = 1;
	InputCommand input_command = 2;
}

// @auto_generate
message InputCommandToS
{
	string session_id = 1;
	int64 tick = 2;
	InputCommand input_command = 3;
	ProtoTransform entity_transform = 4;
	repeated InputCommandEntry recent_inputs = 5;
}
